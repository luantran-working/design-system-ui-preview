<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Systems Preview</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title">Design Systems</h1>
        <p class="sidebar-subtitle">Preview 138+ design systems</p>
      </div>
      
      <div class="search-container">
        <input 
          type="search" 
          id="search" 
          class="search-input" 
          placeholder="Search design systems..."
          autocomplete="off"
        >
      </div>
      
      <nav id="menu" class="menu">
        <!-- Menu items will be generated by app.js -->
      </nav>
      
      <div class="sidebar-footer">
        <p>Open Design Systems</p>
        <p class="footer-link">
          <a href="https://github.com" target="_blank">GitHub</a>
        </p>
      </div>
    </aside>

    <!-- Main Preview Area -->
    <main class="preview-area">
      <header class="preview-header">
        <div class="preview-title-section">
          <h2 id="current-system" class="preview-title">Select a design system</h2>
          <p class="preview-subtitle">Choose from the sidebar to preview</p>
        </div>
        <button id="copy-btn" class="copy-button">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M5.5 2.5h7a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1h-7a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3.5 5.5h-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1v-1" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Copy Markdown
        </button>
      </header>
      
      <div class="preview-content">
        <iframe 
          id="preview-frame" 
          src="template.html"
          class="preview-iframe"
          title="Design System Preview"
        ></iframe>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="js/systems.js"></script>
  <script src="js/fonts.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
